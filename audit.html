<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Federated Graph-RAG Audit Ledger</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    body {
      background: #f4f6f9;
    }
    .page-header {
      background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
      color: #fff;
      border-radius: 0.75rem;
      padding: 1.5rem 2rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 0.5rem 1rem rgba(13, 110, 253, 0.2);
    }
    .table-card {
      border: none;
      border-radius: 0.75rem;
      box-shadow: 0 0.25rem 0.75rem rgba(0, 0, 0, 0.08);
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.85rem;
    }
    .status-badge {
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }
    tr.row-query-started {
      background-color: #e8eef4;
    }
    tr.row-query-started td {
      color: #495057;
      font-weight: 500;
    }
    tr.row-client-recovered {
      background: linear-gradient(90deg, #e8f4fd 0%, #f3e8ff 100%);
      border-left: 4px solid #6f42c1;
    }
    tr.row-client-timeout {
      background-color: #fff5f5;
    }
    .badge-query-started {
      background-color: #adb5bd !important;
      color: #212529 !important;
    }
    .badge-client-responded {
      background-color: #cfe2ff !important;
      color: #084298 !important;
    }
    .badge-update-uploaded {
      background-color: #cff4fc !important;
      color: #055160 !important;
    }
    .badge-client-timeout {
      background-color: #f8d7da !important;
      color: #842029 !important;
    }
    .badge-client-recovered {
      background-color: #6f42c1 !important;
      color: #fff !important;
      box-shadow: 0 0 0 2px rgba(111, 66, 193, 0.25);
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <header class="page-header">
      <h1 class="h3 mb-1">Federated Graph-RAG Audit Ledger</h1>
      <p class="mb-0 opacity-75">Read-only view of exactly-once checkpoint events</p>
    </header>

    <div class="card table-card">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span id="row-count" class="text-muted">Loading ledger...</span>
          <button id="refresh-btn" class="btn btn-sm btn-outline-primary">Refresh</button>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Timestamp</th>
                <th>Query ID</th>
                <th>Client ID</th>
                <th>Round</th>
                <th>Request ID</th>
                <th>Evidence Hash</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="audit-body">
              <tr>
                <td colspan="7" class="text-center text-muted py-4">Fetching audit data...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    function statusBadgeClass(status) {
      if (status === "update_committed") return "bg-success";
      if (status === "duplicate_ignored") return "bg-warning text-dark";
      if (status === "query_started") return "badge-query-started";
      if (status === "client_responded") return "badge-client-responded";
      if (status === "update_uploaded") return "badge-update-uploaded";
      if (status === "client_timeout") return "badge-client-timeout";
      if (status === "client_recovered") return "badge-client-recovered";
      if (status === "failed_or_timeout") return "badge-client-timeout";
      return "bg-secondary";
    }

    function statusRowClass(status) {
      if (status === "query_started") return "row-query-started";
      if (status === "client_recovered") return "row-client-recovered";
      if (status === "client_timeout" || status === "failed_or_timeout") {
        return "row-client-timeout";
      }
      return "";
    }

    function truncate(value, maxLength) {
      if (!value) return "";
      const text = String(value);
      return text.length > maxLength ? text.slice(0, maxLength) + "..." : text;
    }

    function renderRows(rows) {
      const tbody = document.getElementById("audit-body");
      const countLabel = document.getElementById("row-count");

      if (!rows.length) {
        tbody.innerHTML =
          '<tr><td colspan="7" class="text-center text-muted py-4">No ledger entries found.</td></tr>';
        countLabel.textContent = "0 entries";
        return;
      }

      countLabel.textContent = rows.length + " most recent entries";
      tbody.innerHTML = rows
        .map((row) => {
          const badgeClass = statusBadgeClass(row.status);
          const rowClass = statusRowClass(row.status);
          return `
            <tr class="${rowClass}">
              <td>${row.timestamp || ""}</td>
              <td class="mono" title="${row.query_id || ""}">${truncate(row.query_id, 20)}</td>
              <td>${row.client_id || ""}</td>
              <td>${row.round_id ?? ""}</td>
              <td class="mono" title="${row.request_id || ""}">${truncate(row.request_id, 16)}</td>
              <td class="mono" title="${row.evidence_hash || ""}">${truncate(row.evidence_hash, 16)}</td>
              <td><span class="badge status-badge ${badgeClass}">${row.status || ""}</span></td>
            </tr>
          `;
        })
        .join("");
    }

    async function loadAuditData() {
      const tbody = document.getElementById("audit-body");
      tbody.innerHTML =
        '<tr><td colspan="7" class="text-center text-muted py-4">Fetching audit data...</td></tr>';

      try {
        const response = await fetch("/audit_data?limit=100");
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        const rows = await response.json();
        renderRows(rows);
      } catch (error) {
        tbody.innerHTML =
          '<tr><td colspan="7" class="text-center text-danger py-4">Failed to load audit data.</td></tr>';
        document.getElementById("row-count").textContent = "Error: " + error.message;
      }
    }

    document.getElementById("refresh-btn").addEventListener("click", loadAuditData);
    loadAuditData();
  </script>
</body>
</html>
